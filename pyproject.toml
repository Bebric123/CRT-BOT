[tool.ruff]
target-version = "py310"
line-length = 100
src = ["bot", "tests", "scripts"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# sys.path перед импортом bot/* — запуск файла напрямую
"tests/**" = ["E402"]
"scripts/**" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
